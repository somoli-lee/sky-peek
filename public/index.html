<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sky Peek</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <!-- ── Left Sidebar ── -->
    <aside class="sidebar" id="sidebar">
      <div class="search-wrap">
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <input id="city-input" type="text" placeholder="도시 이름을 검색하세요..." autocomplete="off" />
          <button id="search-btn" class="search-btn" title="검색">&#10148;</button>
        </div>
        <div class="candidate-list" id="candidate-list" style="display:none"></div>
      </div>

      <div class="weather-main" id="sidebar-content">
        <div class="weather-icon-big" id="main-icon">🌤️</div>
        <div class="temperature-big">
          <span id="main-temp">--</span><span class="temp-unit-label" id="temp-unit-display">°C</span>
        </div>
        <div class="date-time" id="date-time">--</div>
        <hr class="divider" />
        <div class="condition-row">
          <span id="cond-icon">⛅</span>
          <span id="main-description">--</span>
        </div>
        <div class="condition-row">
          <span>🌧️</span>
          <span id="rain-info">강수량: --</span>
        </div>
      </div>

      <!-- 저장된 지역 목록 -->
      <div class="saved-section">
        <div class="saved-header">
          <span class="saved-title">저장된 지역 <span id="saved-count">0</span>/5</span>
          <button id="save-city-btn" class="save-btn" onclick="addCurrentCity()" disabled>+ 저장</button>
        </div>
        <div class="saved-list" id="saved-list">
          <div class="saved-empty">검색 후 지역을 저장하세요</div>
        </div>
      </div>
    </aside>

    <!-- ── Right Main ── -->
    <main class="main-content" id="main-content">
      <!-- 모바일 전용 도시 정보 헤더 -->
      <div class="mobile-city-bar" id="mobile-city-bar">
        <div class="mcb-icon" id="mcb-icon">🌤️</div>
        <div class="mcb-info">
          <div class="mcb-name" id="mcb-name">--</div>
          <div class="mcb-detail" id="mcb-detail">--</div>
        </div>
        <div class="mcb-temp" id="mcb-temp">--</div>
        <button id="mcb-save-btn" class="mcb-save-btn" onclick="addCurrentCity()" disabled>+ 저장</button>
      </div>

      <div id="alert-banner" class="alert-banner" style="display:none"></div>

      <div class="top-bar">
        <div class="tabs">
          <button class="tab active" id="tab-today" onclick="switchTab('today')">Today</button>
          <button class="tab" id="tab-highlights" onclick="switchTab('highlights')">Highlights</button>
          <button class="tab" id="tab-week" onclick="switchTab('week')">Week</button>
          <button class="tab" id="tab-map" onclick="switchTab('map')">🗺 지도</button>
        </div>
        <div class="unit-toggle">
          <button class="unit-btn active" id="btn-c" onclick="setUnit('C')">°C</button>
          <button class="unit-btn" id="btn-f" onclick="setUnit('F')">°F</button>
        </div>
      </div>

      <!-- Today view -->
      <div id="view-today">
        <div class="forecast-row" id="forecast-row"></div>
        <div class="temp-chart-wrap">
          <canvas id="temp-chart"></canvas>
        </div>
        <div class="weather-summary" id="today-summary"></div>
      </div>

      <!-- Highlights view -->
      <div id="view-highlights" style="display:none">
        <div class="highlights-grid">

          <div class="highlight-card">
            <div class="card-label">UV Index</div>
            <div class="uv-wrap">
              <canvas id="uv-canvas" width="140" height="82"></canvas>
              <div class="gauge-center-val" id="uv-value">N/A</div>
            </div>
          </div>

          <div class="highlight-card">
            <div class="card-label">Wind Status</div>
            <div class="big-value">
              <span id="wind-speed">--</span>
              <span class="unit-small">m/s</span>
            </div>
            <div class="sub-value">
              <span class="compass-dot"></span>
              <span id="wind-dir-label">--</span>
            </div>
          </div>

          <div class="highlight-card">
            <div class="card-label">Sunrise &amp; Sunset</div>
            <div class="sun-rows">
              <div class="sun-row">
                <div class="sun-circle rise">🌅</div>
                <div>
                  <div class="sun-time" id="sunrise-time">--:--</div>
                  <div class="sun-note">일출</div>
                </div>
              </div>
              <div class="sun-row">
                <div class="sun-circle set">🌇</div>
                <div>
                  <div class="sun-time" id="sunset-time">--:--</div>
                  <div class="sun-note">일몰</div>
                </div>
              </div>
            </div>
          </div>

          <div class="highlight-card">
            <div class="card-label">Humidity</div>
            <div class="big-value">
              <span id="humidity-val">--</span>
              <span class="unit-small">%</span>
            </div>
            <div class="progress-wrap">
              <div class="progress-bg">
                <div class="progress-fill" id="hum-bar"></div>
                <div class="progress-dot" id="hum-dot"></div>
              </div>
              <div class="progress-labels"><span>0</span><span>50</span><span>100</span></div>
            </div>
            <div class="sub-value" id="hum-status"></div>
          </div>

          <div class="highlight-card">
            <div class="card-label">미세먼지 <span class="station-name" id="air-station"></span></div>
            <div class="air-grid">
              <div class="air-item">
                <div class="air-item-label">PM10</div>
                <div class="air-item-val"><span id="pm10-val">--</span><span class="unit-small">㎍</span></div>
                <div class="air-grade-badge" id="pm10-grade"></div>
              </div>
              <div class="air-item">
                <div class="air-item-label">PM2.5</div>
                <div class="air-item-val"><span id="pm25-val">--</span><span class="unit-small">㎍</span></div>
                <div class="air-grade-badge" id="pm25-grade"></div>
              </div>
              <div class="air-item">
                <div class="air-item-label">오존 O₃</div>
                <div class="air-item-val"><span id="o3-val">--</span><span class="unit-small">ppm</span></div>
                <div class="air-grade-badge" id="o3-grade"></div>
              </div>
              <div class="air-item">
                <div class="air-item-label">이산화질소 NO₂</div>
                <div class="air-item-val"><span id="no2-val">--</span><span class="unit-small">ppm</span></div>
              </div>
            </div>
            <div class="sub-value" id="air-status"></div>
            <div class="air-recommendation" id="air-recommendation"></div>
          </div>

        </div>
      </div>

      <!-- Week view -->
      <div id="view-week" style="display:none">
        <div class="week-list" id="week-list"></div>
        <div class="weather-summary" id="week-summary"></div>
      </div>

      <!-- Map view -->
      <div id="view-map" style="display:none">
        <div id="weather-map"></div>
      </div>

      <!-- Loading -->
      <div id="loading" class="overlay-center" style="display:none">
        <div class="spinner"></div>
        <p>날씨 정보를 불러오는 중...</p>
      </div>

      <!-- Error -->
      <div id="error-card" class="error-card" style="display:none">
        <span class="error-icon">⚠️</span>
        <p id="error-msg"></p>
        <p id="error-hint" class="error-hint"></p>
      </div>

      <!-- Attribution -->
      <footer class="attribution">
        출처: <a href="https://www.data.go.kr" target="_blank" rel="noopener">기상청</a> ·
        <a href="https://www.airkorea.or.kr" target="_blank" rel="noopener">에어코리아(한국환경공단)</a> ·
        <a href="https://open-meteo.com" target="_blank" rel="noopener">Open-Meteo</a> ·
        <a href="https://www.openstreetmap.org" target="_blank" rel="noopener">OpenStreetMap</a>
      </footer>
    </main>

    <!-- ── 모바일 하단 탭 네비게이션 ── -->
    <nav class="mobile-nav">
      <button class="mobile-nav-btn active" data-panel="sidebar" onclick="switchMobilePanel('sidebar')">
        <span class="mnb-icon">🌤</span>
        <span class="mnb-label">날씨</span>
      </button>
      <button class="mobile-nav-btn" data-panel="main" onclick="switchMobilePanel('main')">
        <span class="mnb-icon">📅</span>
        <span class="mnb-label">예보</span>
      </button>
      <button class="mobile-nav-btn" data-panel="map" onclick="switchMobilePanel('map')">
        <span class="mnb-icon">🗺</span>
        <span class="mnb-label">지도</span>
      </button>
    </nav>

  </div><!-- /app -->

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
